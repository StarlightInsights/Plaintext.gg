name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite Plus
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true
          # We re-run install with --frozen-lockfile below to enforce the
          # lockfile in CI, so skip the action's auto-install.
          run-install: false

      - name: Install dependencies
        # `vp install` detects pnpm-lock.yaml and runs pnpm under the hood,
        # which satisfies the `preinstall` pnpm-only guard in package.json.
        # Postinstall downloads chromium via `playwright install chromium`.
        run: vp install --frozen-lockfile

      - name: Format + lint (vp check)
        run: vp check

      - name: Typecheck
        run: vp run typecheck

      - name: Unit tests
        run: vp run test:unit

      # E2E tests run against the actual production Docker image so we exercise
      # the real nginx config + static-file serving + SPA fallback.
      - name: Build Docker image
        run: docker build -t plaintext-gg .

      - name: Start container
        run: docker run -d --rm -p 3999:80 --name plaintext-gg plaintext-gg

      - name: Wait for container to be ready
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:3999 > /dev/null; do sleep 1; done' \
            || { echo "Container failed to become ready"; docker logs plaintext-gg; exit 1; }

      - name: Install Playwright system deps
        # `npx` ships with Node and resolves binaries from node_modules/.bin,
        # so this works without pnpm being on PATH.
        run: npx playwright install-deps chromium

      - name: E2E tests
        env:
          # Opts the `tests/e2e/nginx.spec.ts` suite in — those tests assert
          # nginx-specific behavior (security headers, cache-control, SPA
          # fallback status codes) that vp preview doesn't mirror.
          TEST_DOCKER_HOSTING: "1"
        run: vp run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Dump container logs on failure
        if: failure()
        run: docker logs plaintext-gg

      - name: Stop container
        if: always()
        run: docker stop plaintext-gg || true
